<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" class="diagram diagram-dlayer" role="img" aria-labelledby="dia-dl-title dia-dl-desc" preserveAspectRatio="xMidYMid meet">
  <title id="dia-dl-title">Fluxo do data layer entre cliente, GTM e destinos</title>
  <desc id="dia-dl-desc">O cliente (browser ou app) empurra eventos pro objeto dataLayer. O GTM escuta, valida contra um schema versionado, enriquece com contexto persistido e distribui pras três famílias de destinos, analytics, ads e CRM.</desc>

  <defs>
    <marker id="dl-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="diagram__arrow-head"/>
    </marker>
  </defs>

  <text class="diagram__kicker" x="480" y="28" text-anchor="middle">DATA LAYER  ·  1 EMISSOR  ·  1 SCHEMA  ·  N DESTINOS</text>

  <g transform="translate(40, 70)">
    <rect class="diagram__node" x="0" y="0" width="220" height="110" rx="6"/>
    <text class="diagram__node-tag"    x="14" y="24">EMISSOR</text>
    <text class="diagram__node-title"  x="14" y="52">Cliente</text>
    <text class="diagram__node-metric" x="14" y="78">browser ou app</text>
    <text class="diagram__node-note"   x="14" y="98">dataLayer.push(event)</text>
  </g>

  <line class="diagram__edge" x1="260" y1="125" x2="370" y2="125" marker-end="url(#dl-arrow)"/>

  <g transform="translate(370, 70)">
    <rect class="diagram__engine" x="0" y="0" width="220" height="110" rx="8"/>
    <text class="diagram__engine-tag"   x="110" y="24" text-anchor="middle">ROTEADOR</text>
    <text class="diagram__engine-title" x="110" y="56" text-anchor="middle">GTM</text>
    <text class="diagram__engine-meta"  x="110" y="82" text-anchor="middle">valida contra schema</text>
    <text class="diagram__engine-meta"  x="110" y="100" text-anchor="middle">enriquece com contexto</text>
  </g>

  <line class="diagram__edge" x1="590" y1="90"  x2="700" y2="90"  marker-end="url(#dl-arrow)"/>
  <line class="diagram__edge" x1="590" y1="125" x2="700" y2="125" marker-end="url(#dl-arrow)"/>
  <line class="diagram__edge" x1="590" y1="160" x2="700" y2="160" marker-end="url(#dl-arrow)"/>

  <g transform="translate(700, 55)">
    <rect class="diagram__node" x="0" y="0" width="220" height="45" rx="6"/>
    <text class="diagram__node-tag"    x="14" y="20">ANALYTICS</text>
    <text class="diagram__node-title"  x="14" y="38">GA4 + Looker</text>
  </g>
  <g transform="translate(700, 105)">
    <rect class="diagram__node" x="0" y="0" width="220" height="45" rx="6"/>
    <text class="diagram__node-tag"    x="14" y="20">ADS</text>
    <text class="diagram__node-title"  x="14" y="38">Google Ads, Meta, X</text>
  </g>
  <g transform="translate(700, 155)">
    <rect class="diagram__node" x="0" y="0" width="220" height="45" rx="6"/>
    <text class="diagram__node-tag"    x="14" y="20">CRM / CDP</text>
    <text class="diagram__node-title"  x="14" y="38">HubSpot, Salesforce</text>
  </g>

  <!-- Schema lane -->
  <g transform="translate(40, 220)">
    <rect class="diagram__engine" x="0" y="0" width="880" height="80" rx="8"/>
    <text class="diagram__engine-tag"   x="440" y="24" text-anchor="middle">SCHEMA COMPARTILHADO  ·  VERSIONADO (data_layer_schema_v3.json)</text>
    <text class="diagram__engine-meta"  x="440" y="48" text-anchor="middle">snake_case, enum fechado em `event`, `page_type` e `user_role`, ids estáveis (não traduzidos, não localizados)</text>
    <text class="diagram__engine-meta"  x="440" y="68" text-anchor="middle">mesmo schema consumido por GTM, QA automatizado, pipeline de BI e times de dados e produto</text>
  </g>

  <!-- Anti-patterns lane -->
  <g transform="translate(40, 320)">
    <rect class="diagram__node" x="0" y="0" width="880" height="100" rx="6"/>
    <text class="diagram__node-tag"    x="14" y="24">ANTI-PADRÕES QUE QUEBRAM TUDO</text>
    <text class="diagram__node-metric" x="14" y="50">push com camelCase em metade e snake_case em outra metade (event_name vs eventName)</text>
    <text class="diagram__node-metric" x="14" y="70">valores localizados (`adicionar_ao_carrinho` pro pt, `add_to_cart` pro en), o report não soma</text>
    <text class="diagram__node-metric" x="14" y="90">variáveis viram eventos e vice-versa, o pipeline não sabe o que é gatilho e o que é atributo</text>
  </g>
</svg>
